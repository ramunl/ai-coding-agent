name: Deploy AI Agent

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy webhook URL
        shell: python
        run: |
          import os
          import sys
          from urllib.parse import urlparse

          url = os.environ.get("DEPLOY_WEBHOOK_URL", "")
          parsed = urlparse(url)

          expected_host = os.environ.get("DEPLOY_WEBHOOK_HOST", "")
          expected_port = os.environ.get("DEPLOY_WEBHOOK_PORT", "")

          checks = [
              (bool(url), "DEPLOY_WEBHOOK_URL is empty"),
              (parsed.scheme in ("http", "https"), "DEPLOY_WEBHOOK_URL must use http or https"),
              (parsed.path == "/hooks/ai-agent-update", "DEPLOY_WEBHOOK_URL path must be /hooks/ai-agent-update"),
              (parsed.query.startswith("secret="), "DEPLOY_WEBHOOK_URL must include the secret query parameter"),
          ]

          # Optional stricter checks, enabled by setting repository variables.
          if expected_host:
              checks.append((parsed.hostname == expected_host, "DEPLOY_WEBHOOK_URL host is not the expected server host"))
          if expected_port:
              checks.append((str(parsed.port) == expected_port, "DEPLOY_WEBHOOK_URL port is not the expected port"))

          errors = [message for ok, message in checks if not ok]
          if errors:
              for message in errors:
                  print(f"::error::{message}")
              sys.exit(1)

          print("DEPLOY_WEBHOOK_URL format OK")
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_HOST: ${{ vars.DEPLOY_WEBHOOK_HOST }}
          DEPLOY_WEBHOOK_PORT: ${{ vars.DEPLOY_WEBHOOK_PORT }}

      - name: Call deploy webhook
        run: curl --fail --show-error --silent -X POST "$DEPLOY_WEBHOOK_URL"
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
